<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Polter — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-1); }
  body {
    padding: 28px 32px;
    min-height: 200px;
    box-sizing: border-box;
    font-family: var(--font-ui);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: center;
  }
  .group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 12px; display: block; }
  .btn {
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 140ms;
  }
  .btn-primary { background: #d4b87a; color: #1a1612; }
  .btn-primary:hover { background: #e0c688; }
  .btn-secondary { background: var(--bg-3); color: var(--fg-1); border-color: var(--border-2); }
  .btn-secondary:hover { background: #2c303b; }
  .btn-ghost { background: transparent; color: var(--fg-2); }
  .btn-ghost:hover { color: var(--fg-1); }
  .btn-link { background: transparent; color: var(--accent); padding: 0; border: 0; text-decoration: underline; text-underline-offset: 4px; text-decoration-thickness: 1px; text-decoration-color: rgba(212,184,122,0.4); cursor: pointer; }
  .btn-sm { font-size: 12px; padding: 7px 12px; border-radius: 6px; }
  .chip { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 6px 10px; border-radius: 4px; background: var(--bg-3); color: var(--fg-2); border: 1px solid var(--border-1); }
</style>
</head>
<body>
  <div>
    <span class="label">Primary actions</span>
    <div class="group">
      <button class="btn btn-primary">Download for mac</button>
      <button class="btn btn-secondary">View on github</button>
      <button class="btn btn-ghost">Quit</button>
    </div>
  </div>
  <div>
    <span class="label">Inline & chips</span>
    <div class="group">
      <button class="btn btn-secondary btn-sm">Pause polter</button>
      <button class="btn btn-link">read the privacy note</button>
      <span class="chip">tuesday</span>
      <span class="chip">04:21pm</span>
    </div>
  </div>
</body>
</html>
