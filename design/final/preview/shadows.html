<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Polter — Shadows & elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-1); color: var(--fg-1); }
  body {
    padding: 32px;
    min-height: 240px;
    box-sizing: border-box;
    font-family: var(--font-ui);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    align-items: center;
    justify-items: center;
  }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .surface {
    width: 130px; height: 90px;
    border-radius: 12px;
    background: var(--bg-2);
    border: 1px solid var(--border-1);
  }
  .bubble {
    border-radius: 18px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 12px 40px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.4);
  }
  .card {
    box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 6px 18px rgba(0,0,0,0.25);
  }
  .glow {
    background: var(--bg-1);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .glow img { width: 48px; height: 48px; image-rendering: pixelated; filter: drop-shadow(0 0 18px rgba(245, 244, 239, 0.55)); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="cell">
    <div class="surface bubble"></div>
    <div class="name">shadow-bubble</div>
    <div class="tag">insight bubbles</div>
  </div>
  <div class="cell">
    <div class="surface card"></div>
    <div class="name">shadow-card</div>
    <div class="tag">elevated cards</div>
  </div>
  <div class="cell">
    <div class="surface glow"><img src="../assets/ghost/front.png" alt=""></div>
    <div class="name">glow-ghost</div>
    <div class="tag">curious / present</div>
  </div>
</body>
</html>
