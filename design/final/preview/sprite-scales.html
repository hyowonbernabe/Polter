<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Polter — Sprite scales</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-1); }
  body {
    padding: 24px;
    min-height: 220px;
    box-sizing: border-box;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    gap: 16px;
  }
  .stack { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .stack span {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-3);
  }
  .s1 { width: 48px; height: 48px; }
  .s2 { width: 96px; height: 96px; }
  .s3 { width: 144px; height: 144px; }
</style>
</head>
<body>
  <div class="stack"><img src="../assets/ghost/front.png" class="pixel-art s1" alt=""><span>1× — 48px</span></div>
  <div class="stack"><img src="../assets/ghost/front.png" class="pixel-art s2" alt=""><span>2× — 96px</span></div>
  <div class="stack"><img src="../assets/ghost/front.png" class="pixel-art s3" alt=""><span>3× — 144px</span></div>
</body>
</html>
