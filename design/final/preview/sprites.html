<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Polter — Sprites</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-1); }
  body {
    padding: 24px;
    box-sizing: border-box;
    min-height: 150px;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 12px;
    align-items: center;
    justify-items: center;
  }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .cell img { width: 64px; height: 64px; }
  .cell span {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-3);
  }
</style>
</head>
<body>
  <div class="cell"><img src="../assets/ghost/back-left.png" class="pixel-art" alt=""><span>back-left</span></div>
  <div class="cell"><img src="../assets/ghost/back.png" class="pixel-art" alt=""><span>back</span></div>
  <div class="cell"><img src="../assets/ghost/back-right.png" class="pixel-art" alt=""><span>back-right</span></div>
  <div class="cell"><img src="../assets/ghost/left.png" class="pixel-art" alt=""><span>left</span></div>
  <div class="cell"><img src="../assets/ghost/right.png" class="pixel-art" alt=""><span>right</span></div>
  <div class="cell"><img src="../assets/ghost/front-left.png" class="pixel-art" alt=""><span>front-left</span></div>
  <div class="cell"><img src="../assets/ghost/front.png" class="pixel-art" alt=""><span>front</span></div>
  <div class="cell"><img src="../assets/ghost/front-right.png" class="pixel-art" alt=""><span>front-right</span></div>
</body>
</html>
