<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Polter — Type families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-1); color: var(--fg-1); }
  body {
    padding: 28px 32px;
    min-height: 240px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 140px 1fr;
    row-gap: 22px;
    column-gap: 28px;
    align-items: center;
  }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
  .meta b { display: block; color: var(--fg-1); margin-bottom: 4px; font-weight: 400; }
  .specimen-serif { font-family: var(--font-serif); font-style: italic; font-size: 38px; line-height: 1.05; letter-spacing: -0.02em; color: var(--fg-1); }
  .specimen-ui { font-family: var(--font-ui); font-size: 22px; line-height: 1.3; color: var(--fg-1); font-weight: 500; }
  .specimen-mono { font-family: var(--font-mono); font-size: 16px; letter-spacing: 0.02em; color: var(--fg-2); }
</style>
</head>
<body>
  <div class="meta"><b>Newsreader</b>voice · display</div>
  <div class="specimen-serif">you've been still for a while.</div>

  <div class="meta"><b>Inter Tight</b>ui · body</div>
  <div class="specimen-ui">Settings · Dashboard · Privacy</div>

  <div class="meta"><b>Departure Mono</b>meta · code</div>
  <div class="specimen-mono">04:21pm — 11 keystrokes/min</div>
</body>
</html>
