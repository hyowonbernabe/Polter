<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Polter — Voice specimen</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-1); }
  body {
    padding: 36px 40px;
    min-height: 220px;
    box-sizing: border-box;
    color: var(--fg-1);
    display: flex;
    flex-direction: column;
    gap: 20px;
    justify-content: center;
  }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-3); }
  .voice {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.35;
    letter-spacing: -0.015em;
    color: var(--fg-1);
    text-transform: lowercase;
    max-width: 600px;
  }
  .voice .dim { color: var(--fg-2); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="eyebrow">the ghost speaks</div>
  <div class="voice">you've been still for a while. <span class="dim">that's unusual for a tuesday.</span></div>
  <div class="meta">— newsreader italic, lowercase, second-person, present tense</div>
</body>
</html>
