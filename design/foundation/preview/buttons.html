<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;color:var(--fg);font-family:var(--font-body);}
  .wrap{padding:30px;display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .btn{appearance:none;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
       color:var(--moon-100);font-family:var(--font-body);font-size:14px;font-weight:500;
       padding:10px 18px;border-radius:10px;cursor:pointer;letter-spacing:-.005em;
       transition:opacity .2s;}
  .btn:hover{opacity:.8;}
  .btn.primary{background:rgba(111,182,217,.16);border-color:rgba(111,182,217,.35);color:#cfeaf8;
               box-shadow:0 0 20px rgba(111,182,217,.18),inset 0 1px 0 rgba(255,255,255,.06);}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--moon-300);}
  .btn.ghost:hover{color:var(--moon-100);}
  .btn.danger{color:#e89466;border-color:rgba(232,148,102,.3);}
  .icon-btn{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;
            border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
            color:var(--moon-300);cursor:pointer;}
  .icon-btn:hover{color:var(--moon-100);background:rgba(255,255,255,.07);}
  svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
</style></head>
<body>
<div class="wrap">
  <button class="btn primary">listen now</button>
  <button class="btn">settings</button>
  <button class="btn ghost">dismiss</button>
  <button class="btn danger">sleep</button>
  <button class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  <button class="icon-btn"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  <button class="icon-btn"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
</div>
</body></html>
