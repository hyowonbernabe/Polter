<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – Ink Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;font-family:var(--font-body);color:var(--fg);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:24px;}
  .sw{aspect-ratio:1.2/1;border-radius:10px;border:1px solid rgba(255,255,255,.06);
      padding:12px;display:flex;flex-direction:column;justify-content:space-between;}
  .name{font-family:var(--font-pixel);font-size:10px;letter-spacing:0.14em;color:var(--moon-200);text-transform:lowercase;}
  .hex{font-family:var(--font-pixel);font-size:10px;letter-spacing:0.1em;color:var(--moon-400);text-transform:uppercase;}
  .light{color:var(--moon-200);} .light .hex{color:var(--moon-300);}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#0b0d14"><span class="name">ink&nbsp;900</span><span class="hex">#0b0d14</span></div>
  <div class="sw" style="background:#11141d"><span class="name">ink&nbsp;850</span><span class="hex">#11141d</span></div>
  <div class="sw" style="background:#161a25"><span class="name">ink&nbsp;800</span><span class="hex">#161a25</span></div>
  <div class="sw" style="background:#1f2433"><span class="name">ink&nbsp;700</span><span class="hex">#1f2433</span></div>
  <div class="sw" style="background:#2a3145"><span class="name">ink&nbsp;600</span><span class="hex">#2a3145</span></div>
</div>
</body></html>
