<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – Moon Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;font-family:var(--font-body);color:var(--fg);}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:24px;}
  .sw{aspect-ratio:1/1;border-radius:10px;border:1px solid rgba(255,255,255,.06);
      padding:10px;display:flex;flex-direction:column;justify-content:space-between;color:#0b0d14;}
  .name{font-family:var(--font-pixel);font-size:10px;letter-spacing:0.14em;text-transform:lowercase;}
  .hex{font-family:var(--font-pixel);font-size:9px;letter-spacing:0.1em;opacity:.7;text-transform:uppercase;}
  .dark{color:var(--moon-200);}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#f4f1ea"><span class="name">moon&nbsp;50</span><span class="hex">#f4f1ea</span></div>
  <div class="sw" style="background:#e6e2d6"><span class="name">moon&nbsp;100</span><span class="hex">#e6e2d6</span></div>
  <div class="sw" style="background:#cfcabd"><span class="name">moon&nbsp;200</span><span class="hex">#cfcabd</span></div>
  <div class="sw" style="background:#a8a395"><span class="name">moon&nbsp;300</span><span class="hex">#a8a395</span></div>
  <div class="sw dark" style="background:#6f6c63"><span class="name">moon&nbsp;400</span><span class="hex">#6f6c63</span></div>
  <div class="sw dark" style="background:#4a4842"><span class="name">moon&nbsp;500</span><span class="hex">#4a4842</span></div>
</div>
</body></html>
