<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – State Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;font-family:var(--font-body);color:var(--fg);}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:20px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .orb{width:56px;height:56px;border-radius:50%;position:relative;}
  .orb::after{content:"";position:absolute;inset:-12px;border-radius:50%;
              background:radial-gradient(circle,var(--g),transparent 65%);z-index:-1;}
  .meta{text-align:center;}
  .name{display:block;font-family:var(--font-pixel);font-size:10px;letter-spacing:0.14em;color:var(--moon-200);text-transform:lowercase;}
  .hex{display:block;font-family:var(--font-pixel);font-size:9px;letter-spacing:0.08em;color:var(--moon-400);text-transform:uppercase;margin-top:2px;}
</style></head>
<body>
<div class="row">
  <div class="cell"><div class="orb" style="background:#6fb6d9;--g:rgba(111,182,217,.55);"></div><div class="meta"><span class="name">focus</span><span class="hex">#6fb6d9</span></div></div>
  <div class="cell"><div class="orb" style="background:#7c92e8;--g:rgba(124,146,232,.50);"></div><div class="meta"><span class="name">calm</span><span class="hex">#7c92e8</span></div></div>
  <div class="cell"><div class="orb" style="background:#9b7fe0;--g:rgba(155,127,224,.55);"></div><div class="meta"><span class="name">deep</span><span class="hex">#9b7fe0</span></div></div>
  <div class="cell"><div class="orb" style="background:#e8b86a;--g:rgba(232,184,106,.60);"></div><div class="meta"><span class="name">spark</span><span class="hex">#e8b86a</span></div></div>
  <div class="cell"><div class="orb" style="background:#e89466;--g:rgba(232,148,102,.55);"></div><div class="meta"><span class="name">burn</span><span class="hex">#e89466</span></div></div>
  <div class="cell"><div class="orb" style="background:#8a8298;--g:rgba(138,130,152,.40);"></div><div class="meta"><span class="name">fade</span><span class="hex">#8a8298</span></div></div>
  <div class="cell"><div class="orb" style="background:#5d6478;--g:rgba(93,100,120,.30);"></div><div class="meta"><span class="name">rest</span><span class="hex">#5d6478</span></div></div>
</div>
</body></html>
