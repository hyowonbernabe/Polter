<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;color:var(--fg);font-family:var(--font-body);}
  .wrap{padding:24px;display:flex;align-items:center;justify-content:space-around;gap:18px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .ic{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--moon-300);}
  svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
  .lbl{font-family:var(--font-pixel);font-size:10px;letter-spacing:.14em;color:var(--moon-400);text-transform:lowercase;}
  .pix{width:24px;height:24px;image-rendering:pixelated;}
  .note{font-family:var(--font-body);font-size:12px;color:var(--moon-400);text-align:center;max-width:140px;line-height:1.4;}
</style></head>
<body>
<div class="wrap">
  <div class="cell"><div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div><span class="lbl">settings</span></div>
  <div class="cell"><div class="ic"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></div><span class="lbl">sleep</span></div>
  <div class="cell"><div class="ic"><svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg></div><span class="lbl">mute</span></div>
  <div class="cell"><div class="ic"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div><span class="lbl">close</span></div>
  <div class="cell"><img class="pix" src="../assets/sprites/wisp-focus.png"><span class="note">pixel sprites are part of the brand</span></div>
</div>
</body></html>
