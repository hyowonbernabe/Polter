<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;font-family:var(--font-body);color:var(--fg);}
  .wrap{display:flex;align-items:center;justify-content:center;height:160px;gap:48px;
        background:radial-gradient(ellipse at 30% 50%, rgba(111,182,217,0.08), transparent 60%), #0b0d14;}
  .lockup{display:flex;align-items:center;gap:16px;}
  .lockup img.icon{width:56px;height:56px;}
  .lockup .word{font-size:42px;font-weight:600;letter-spacing:-0.02em;color:var(--moon-50);}
  .alt{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .alt img{width:40px;height:40px;}
  .alt span{font-family:var(--font-pixel);font-size:10px;letter-spacing:0.12em;color:var(--moon-400);text-transform:uppercase;}
</style></head>
<body>
<div class="wrap">
  <div class="lockup">
    <img class="icon" src="../assets/icon.svg" alt="">
    <span class="word">wisp</span>
  </div>
  <div class="alt">
    <img src="../assets/icon.svg" alt="">
    <span>icon only</span>
  </div>
</div>
</body></html>
