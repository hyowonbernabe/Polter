<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;color:var(--fg);font-family:var(--font-body);}
  .row{display:flex;align-items:center;justify-content:space-around;padding:24px;gap:20px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:80px;height:80px;background:linear-gradient(135deg,#1f2433,#161a25);border:1px solid rgba(255,255,255,.06);}
  .name{font-family:var(--font-pixel);font-size:10px;letter-spacing:.14em;color:var(--moon-300);text-transform:lowercase;}
  .hex{font-family:var(--font-pixel);font-size:9px;color:var(--moon-400);}
</style></head>
<body>
<div class="row">
  <div class="cell"><div class="box" style="border-radius:0"></div><span class="name">pixel</span><span class="hex">0px</span></div>
  <div class="cell"><div class="box" style="border-radius:6px"></div><span class="name">chip</span><span class="hex">6px</span></div>
  <div class="cell"><div class="box" style="border-radius:14px"></div><span class="name">panel</span><span class="hex">14px</span></div>
  <div class="cell"><div class="box" style="border-radius:18px"></div><span class="name">card</span><span class="hex">18px</span></div>
  <div class="cell"><div class="box" style="border-radius:999px"></div><span class="name">pill</span><span class="hex">999px</span></div>
</div>
</body></html>
