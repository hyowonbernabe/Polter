<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – Shadow & Glow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;color:var(--fg);font-family:var(--font-body);}
  .row{display:flex;align-items:center;justify-content:space-around;padding:30px 24px;gap:16px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .panel-d{width:120px;height:80px;border-radius:14px;background:rgba(17,20,29,0.72);
           border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(24px);
           box-shadow:0 24px 64px -12px rgba(0,0,0,.6),0 4px 16px -4px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);}
  .bloom{width:32px;height:32px;border-radius:50%;background:#6fb6d9;
         box-shadow:0 0 24px 4px rgba(111,182,217,.55),0 0 48px 12px rgba(111,182,217,.4),0 0 96px 24px rgba(111,182,217,.18);}
  .bloom.spark{background:#e8b86a;box-shadow:0 0 24px 4px rgba(232,184,106,.6),0 0 48px 12px rgba(232,184,106,.4),0 0 96px 24px rgba(232,184,106,.2);}
  .bloom.deep{background:#9b7fe0;box-shadow:0 0 24px 4px rgba(155,127,224,.55),0 0 48px 12px rgba(155,127,224,.4),0 0 96px 24px rgba(155,127,224,.18);}
  .name{font-family:var(--font-pixel);font-size:10px;letter-spacing:.14em;color:var(--moon-300);}
</style></head>
<body>
<div class="row">
  <div class="cell"><div class="panel-d"></div><span class="name">panel float</span></div>
  <div class="cell"><div class="bloom"></div><span class="name">bloom · focus</span></div>
  <div class="cell"><div class="bloom spark"></div><span class="name">bloom · spark</span></div>
  <div class="cell"><div class="bloom deep"></div><span class="name">bloom · deep</span></div>
</div>
</body></html>
