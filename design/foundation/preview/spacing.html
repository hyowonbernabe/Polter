<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;color:var(--fg);font-family:var(--font-body);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:center;gap:16px;}
  .name{font-family:var(--font-pixel);font-size:11px;letter-spacing:.14em;color:var(--moon-300);width:80px;}
  .px{font-family:var(--font-pixel);font-size:10px;color:var(--moon-400);width:40px;text-align:right;}
  .bar{height:10px;background:#6fb6d9;border-radius:2px;box-shadow:0 0 12px rgba(111,182,217,.35);}
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="name">space&nbsp;1</span><span class="px">4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="name">space&nbsp;2</span><span class="px">8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="name">space&nbsp;3</span><span class="px">12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="name">space&nbsp;4</span><span class="px">16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="name">space&nbsp;5</span><span class="px">20</span><div class="bar" style="width:20px"></div></div>
  <div class="row"><span class="name">space&nbsp;6</span><span class="px">24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="name">space&nbsp;8</span><span class="px">32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="name">space&nbsp;10</span><span class="px">40</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="name">space&nbsp;12</span><span class="px">48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="name">space&nbsp;16</span><span class="px">64</span><div class="bar" style="width:64px"></div></div>
</div>
</body></html>
