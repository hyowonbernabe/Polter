<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – Type Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;color:var(--fg);}
  .wrap{padding:20px 28px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:baseline;gap:20px;}
  .tag{font-family:var(--font-pixel);font-size:10px;letter-spacing:.14em;color:var(--moon-400);text-transform:lowercase;width:140px;flex:none;}
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="tag">display · 40/600</span><span class="type-display">it noticed.</span></div>
  <div class="row"><span class="tag">h1 · 28/600</span><span class="type-h1">last seven days</span></div>
  <div class="row"><span class="tag">h2 · 20/500</span><span class="type-h2">focus blocks</span></div>
  <div class="row"><span class="tag">insight · 17/400</span><span class="type-insight">you've been still for a while. that's unusual for a tuesday.</span></div>
  <div class="row"><span class="tag">body · 15/400</span><span class="type-body">Wisp watches how you work, not what you type.</span></div>
  <div class="row"><span class="tag">caption · 13/400</span><span class="type-caption">last updated three minutes ago</span></div>
</div>
</body></html>
