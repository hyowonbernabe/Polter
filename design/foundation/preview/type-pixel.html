<!doctype html>
<html><head><meta charset="utf-8"><title>Wisp – Type Pixel</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0b0d14;color:var(--fg);}
  .wrap{padding:24px 28px;display:flex;flex-direction:column;gap:18px;}
  .row{display:flex;align-items:baseline;gap:20px;}
  .tag{font-family:var(--font-body);font-size:11px;color:var(--moon-400);width:140px;flex:none;}
  .data{font-family:var(--font-pixel);font-size:24px;letter-spacing:.10em;color:var(--state-focus);}
  .label{font-family:var(--font-pixel);font-size:13px;letter-spacing:.14em;color:var(--moon-300);text-transform:lowercase;}
  .stamp{font-family:var(--font-pixel);font-size:10px;letter-spacing:.16em;color:var(--moon-400);text-transform:uppercase;}
  .composed{font-family:var(--font-body);font-size:15px;color:var(--moon-200);}
  .composed em{font-family:var(--font-pixel);font-size:11px;letter-spacing:.14em;color:var(--state-focus);font-style:normal;}
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="tag">data · 24px</span><span class="data">04:37:12</span></div>
  <div class="row"><span class="tag">label · 13px</span><span class="label">[ focusing ]</span></div>
  <div class="row"><span class="tag">stamp · 10px</span><span class="stamp">TUE · 14:22</span></div>
  <div class="row"><span class="tag">composed</span><span class="composed"><em>[focus]</em>&nbsp; you've held one window for forty-three minutes.</span></div>
</div>
</body></html>
