<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wisp · Desktop UI Kit</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body, #app { margin: 0; padding: 0; height: 100%; }
  body {
    background: #050811;
    font-family: 'Inter', system-ui, sans-serif;
    color: #f4f1ea;
    overflow: hidden;
  }

  /* Stage frame — simulates "the user's screen". The real product runs as a
     transparent overlay over whatever they're doing. */
  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  /* Floating state switcher — out-of-product control for prototype use */
  .switcher {
    position: absolute;
    top: 16px; right: 16px;
    z-index: 100;
    display: flex; gap: 4px;
    padding: 6px;
    border-radius: 10px;
    background: rgba(17,20,29,0.7);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .switcher button {
    appearance: none; border: none;
    padding: 6px 10px; border-radius: 6px; cursor: pointer;
    background: transparent; color: #a8a395;
    font-family: 'Departure Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em; text-transform: lowercase;
    transition: color 200ms, background 200ms;
  }
  .switcher button:hover { color: #f4f1ea; }
  .switcher button.active {
    background: rgba(255,255,255,0.06);
    color: #f4f1ea;
  }

  /* Hint label, fades out after a while */
  .hint {
    position: absolute;
    top: 16px; left: 16px;
    z-index: 90;
    font-family: 'Departure Mono', monospace;
    font-size: 10px; letter-spacing: 0.16em;
    color: rgba(168,163,149,0.7);
    text-transform: lowercase;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(17,20,29,0.5);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.04);
  }

  /* The wisp lives in the bottom-right corner by default.
     Insight card and dashboard spawn relative to it. */
  .wisp-anchor {
    position: absolute;
    right: 60px;
    bottom: 80px;
    z-index: 50;
  }
  .insight-anchor {
    position: absolute;
    right: 170px;
    bottom: 100px;
    z-index: 60;
  }
  .dashboard-anchor {
    position: absolute;
    right: 60px;
    bottom: 240px;
    z-index: 70;
  }
</style>
</head>
<body>
  <div id="app"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>

  <!-- Data + components -->
  <script src="data.js"></script>
  <script type="text/babel" src="Wallpaper.jsx"></script>
  <script type="text/babel" src="Wisp.jsx"></script>
  <script type="text/babel" src="InsightCard.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>

  <script type="text/babel">
    const STATE_KEYS = ['focus', 'calm', 'deep', 'spark', 'burn', 'fade', 'rest'];

    function App() {
      const [state, setState] = React.useState('focus');
      const [insightVisible, setInsightVisible] = React.useState(true);
      const [dashOpen, setDashOpen] = React.useState(false);
      const [hovered, setHovered] = React.useState(false);

      // Auto-show insight a moment after state change
      React.useEffect(() => {
        setInsightVisible(false);
        setDashOpen(false);
        const t = setTimeout(() => setInsightVisible(true), 400);
        return () => clearTimeout(t);
      }, [state]);

      const showInsight = insightVisible && !dashOpen;

      return (
        <div className="stage">
          <Wallpaper />

          <div className="hint">
            click the wisp · hover for the insight
          </div>

          <div className="switcher">
            {STATE_KEYS.map(k => (
              <button key={k}
                      className={state === k ? 'active' : ''}
                      onClick={() => setState(k)}>
                {window.WISP_DATA.STATES[k].label}
              </button>
            ))}
          </div>

          {dashOpen && (
            <div className="dashboard-anchor">
              <Dashboard state={state} onClose={() => setDashOpen(false)} />
            </div>
          )}

          {showInsight && !dashOpen && (
            <div className="insight-anchor">
              <InsightCard state={state} onDismiss={() => setInsightVisible(false)} />
            </div>
          )}

          <div className="wisp-anchor"
               onMouseEnter={() => { setHovered(true); if (!dashOpen) setInsightVisible(true); }}
               onMouseLeave={() => setHovered(false)}>
            <Wisp state={state}
                  onClick={() => setDashOpen(o => !o)}
                  opacity={state === 'rest' ? 0.55 : (state === 'fade' ? 0.75 : 0.95)} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
